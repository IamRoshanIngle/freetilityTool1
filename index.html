<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Freetility IMG to PDF</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --m3-surface: #FEF7FF;
            --m3-on-surface: #1D1B20;
            --m3-surface-container: #F3EDF7;
            --m3-primary: #6750A4;
            --m3-on-primary: #FFFFFF;
            --m3-secondary-container: #E8DEF8;
            --m3-outline: #79747E;
            --m3-error: #B3261E;
            --m3-on-error: #FFFFFF;
        }

        * { 
            box-sizing: border-box; 
            font-family: 'Roboto', sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--m3-surface);
            color: var(--m3-on-surface);
            margin: 0; padding: 16px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
            text-rendering: optimizeSpeed;
        }

        .container { width: 100%; max-width: 500px; position: relative; }

        .home-link {
            position: absolute; top: 0; left: 0;
            padding: 8px 12px;
            text-decoration: none;
            color: var(--m3-primary);
            font-weight: 500; font-size: 0.85rem;
            display: flex; align-items: center; gap: 8px;
            z-index: 100;
        }

        header { margin: 56px 0 32px 0; text-align: center; }
        .title-line-1 { font-size: 0.75rem; color: var(--m3-primary); letter-spacing: 0.1em; font-weight: 500; text-transform: uppercase; }
        .title-line-2 { font-size: 2.25rem; margin: 4px 0 0 0; font-weight: 400; }

        .drop-zone {
            background: var(--m3-surface-container);
            border: 1px dashed var(--m3-outline);
            border-radius: 12px;
            padding: 32px 16px;
            text-align: center;
            margin-bottom: 24px;
        }

        .btn {
            background: var(--m3-primary);
            color: var(--m3-on-primary);
            border: none;
            padding: 10px 24px;
            border-radius: 100px;
            font-weight: 500;
            font-size: 0.875rem;
            cursor: pointer;
            will-change: transform;
        }

        .action-group { display: none; flex-direction: column; gap: 8px; margin-top: 24px; width: 100%; }
        .btn-generate { width: 100%; padding: 14px; }
        .btn-clear { background: transparent; color: var(--m3-error); width: 100%; padding: 10px; font-size: 0.75rem; }

        #preview-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 8px; margin-top: 16px; 
            touch-action: auto !important;
        }

        .img-card {
            background: var(--m3-surface-container);
            border-radius: 8px;
            position: relative; aspect-ratio: 1/1; overflow: hidden;
            contain: content; /* Performance boost: isolates element from layout tree */
            will-change: transform;
        }

        .img-card img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        .remove-btn {
            position: absolute; top: 4px; right: 4px;
            background: var(--m3-error);
            color: var(--m3-on-error); width: 22px; height: 22px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            z-index: 50; font-size: 12px; cursor: pointer;
        }

        #loader {
            display: none; position: fixed; inset: 0; 
            background: var(--m3-surface); z-index: 9999;
            flex-direction: column; justify-content: center; align-items: center;
            padding: 24px;
        }

        .progress-track {
            width: 100%; max-width: 240px; height: 4px;
            background: var(--m3-secondary-container);
            border-radius: 2px; margin-top: 16px; overflow: hidden;
        }

        #progress-bar { 
            width: 0%; height: 100%; 
            background: var(--m3-primary); 
            will-change: width;
        }

        .sortable-chosen { opacity: 0.5; }
        .sortable-ghost { opacity: 0.1; }
    </style>
</head>
<body>

    <div id="loader">
        <div style="font-size: 1rem; font-weight: 500;">Optimizing PDF</div>
        <div id="status-text" style="margin-top: 4px; font-size: 0.875rem; color: var(--m3-primary);">0 / 0</div>
        <div class="progress-track"><div id="progress-bar"></div></div>
    </div>

    <div class="container">
        <a href="https://iamroshaningle.github.io/freetilityMain/" class="home-link">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            Home
        </a>

        <header>
            <div class="title-line-1">Img to PDF</div>
            <h1 class="title-line-2">Freetility</h1>
        </header>

        <div class="drop-zone">
            <input type="file" id="file-input" multiple accept="image/*" style="display: none;">
            <button class="btn" onclick="document.getElementById('file-input').click()">Add Images</button>
        </div>

        <div id="preview-grid"></div>

        <div id="action-group" class="action-group">
            <button id="generate-btn" class="btn btn-generate">Download PDF</button>
            <button id="clear-btn" class="btn btn-clear">Clear All</button>
        </div>
    </div>

    <!-- Hidden Persistent Canvas for Memory Efficiency -->
    <canvas id="shared-canvas" style="display:none;"></canvas>

    <script>
        const { jsPDF } = window.jspdf;
        const previewGrid = document.getElementById('preview-grid');
        const fileInput = document.getElementById('file-input');
        const actionGroup = document.getElementById('action-group');
        const generateBtn = document.getElementById('generate-btn');
        const clearBtn = document.getElementById('clear-btn');
        const loader = document.getElementById('loader');
        const progressBar = document.getElementById('progress-bar');
        const statusText = document.getElementById('status-text');
        const sharedCanvas = document.getElementById('shared-canvas');
        const ctx = sharedCanvas.getContext('2d', { alpha: false });

        new Sortable(previewGrid, {
            animation: 150, 
            delay: 250, 
            delayOnTouchOnly: true,
            touchStartThreshold: 15, 
            filter: ".remove-btn",
            preventOnFilter: false
        });

        previewGrid.addEventListener('click', (e) => {
            if (e.target.classList.contains('remove-btn')) {
                const card = e.target.closest('.img-card');
                const img = card.querySelector('img');
                if (img.src.startsWith('blob:')) URL.revokeObjectURL(img.src);
                card.remove();
                updateUI();
            }
        });

        clearBtn.addEventListener('click', () => {
            if (confirm("Clear all images?")) {
                previewGrid.querySelectorAll('img').forEach(img => {
                    if (img.src.startsWith('blob:')) URL.revokeObjectURL(img.src);
                });
                previewGrid.innerHTML = '';
                updateUI();
            }
        });

        fileInput.addEventListener('change', (e) => {
            const fragment = document.createDocumentFragment();
            Array.from(e.target.files).forEach(file => {
                const url = URL.createObjectURL(file);
                const div = document.createElement('div');
                div.className = 'img-card';
                div.innerHTML = `<img src="${url}" loading="lazy"><div class="remove-btn">×</div>`;
                fragment.appendChild(div);
            });
            previewGrid.appendChild(fragment);
            updateUI();
            fileInput.value = ""; 
        });

        function updateUI() {
            actionGroup.style.display = previewGrid.children.length > 0 ? 'flex' : 'none';
        }

        generateBtn.addEventListener('click', async () => {
            const cards = Array.from(previewGrid.querySelectorAll('img'));
            if (!cards.length) return;

            loader.style.display = 'flex';
            const pdf = new jsPDF('p', 'mm', 'a4');
            const pW = pdf.internal.pageSize.getWidth();
            const pH = pdf.internal.pageSize.getHeight();

            for (let i = 0; i < cards.length; i++) {
                // Sync UI update with screen refresh
                requestAnimationFrame(() => {
                    progressBar.style.width = Math.round(((i + 1) / cards.length) * 100) + '%';
                    statusText.innerText = `${i + 1} / ${cards.length}`;
                });

                // Yield to main thread
                await new Promise(resolve => setTimeout(resolve, 0));

                const imgElement = cards[i];
                try {
                    // Off-main-thread decoding
                    await imgElement.decode();

                    // Normalize to 1200px for extreme low RAM usage
                    let scale = Math.min(1, 1200 / Math.max(imgElement.naturalWidth, imgElement.naturalHeight));
                    sharedCanvas.width = imgElement.naturalWidth * scale;
                    sharedCanvas.height = imgElement.naturalHeight * scale;
                    
                    ctx.drawImage(imgElement, 0, 0, sharedCanvas.width, sharedCanvas.height);
                    const optimizedData = sharedCanvas.toDataURL('image/jpeg', 0.7);

                    if (i > 0) pdf.addPage();
                    const ratio = sharedCanvas.width / sharedCanvas.height;
                    let w = pW, h = pW / ratio;
                    if (h > pH) { h = pH; w = pH * ratio; }
                    
                    pdf.addImage(optimizedData, 'JPEG', (pW - w) / 2, (pH - h) / 2, w, h, undefined, 'FAST');
                } catch (err) { console.error("Skip corrupted image", i); }
            }

            pdf.save(`Freetility_${Date.now()}.pdf`);
            loader.style.display = 'none';
        });
    </script>
</body>
</html>
